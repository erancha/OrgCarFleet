version: '3.8'

name: orgcarfleet

services:
  postgis:
    image: postgis/postgis:16-3.4
    container_name: postgis
    environment:
      - POSTGRES_DB=orgcarfleet_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
    ports:
      - "5432:5432"
    volumes:
      - postgis_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  car-telemetry-service:
    build:
      context: ./src
      dockerfile: Dockerfile
    image: car-telemetry-service:latest
    container_name: car-telemetry-service
    environment:
      - DOTNET_ENVIRONMENT=Production
      # External Kafka broker (AWS EC2)
      - Kafka__BootstrapServers=${KAFKA_BROKER_ENDPOINT:-ec2-3-71-113-150.eu-central-1.compute.amazonaws.com:19092}
      - Kafka__GroupId=car-telemetry-consumer-group
      - Kafka__Topics__0=orgcarfleet-org-events
      - Kafka__Topics__1=orgcarfleet-fleet-events
      - Kafka__Topics__2=orgcarfleet-car-events
      - Kafka__AutoOffsetReset=earliest
      - Kafka__EnableAutoCommit=false
      # Local PostgreSQL/PostGIS container
      - Postgres__Host=postgis
      - Postgres__Port=5432
      - Postgres__Database=orgcarfleet_db
      - Postgres__Username=postgres
      - Postgres__Password=postgres
    depends_on:
      postgis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgis_data:
