version: '3.8'

services:
  realtime-notifications:
    build:
      context: ../src
      dockerfile: ../scripts/Dockerfile
    image: realtime-notifications:latest
    container_name: realtime-notifications
    environment:
      - ASPNETCORE_URLS=http://0.0.0.0:8080
      - DOTNET_ENVIRONMENT=Production
      - REDIS_URL=ec2-63-180-181-179.eu-central-1.compute.amazonaws.com:6379,password=vsdb-redis
      # Kafka Configuration Overrides
      - Kafka__BootstrapServers=${KAFKA_BROKER_ENDPOINT:-ec2-3-71-113-150.eu-central-1.compute.amazonaws.com:19092}
      - Kafka__GroupId=realtime-notifications-group
      - Kafka__Topics__0=orgcarfleet-notifications
      - Kafka__AutoOffsetReset=latest
      - Kafka__EnableAutoCommit=true
    ports:
      - "8080:8080"
    restart: unless-stopped
